version: '3.8'

services:
  # PostgreSQL for RepAZoo data
  postgres:
    container_name: repazoo-postgres
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: repazoo
      POSTGRES_USER: repazoo_user
      POSTGRES_PASSWORD: repazoo123
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repazoo_user -d repazoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # n8n workflow automation
  n8n:
    container_name: repazoo-n8n
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=repazoo123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
      - N8N_METRICS=true
      # Database connection for n8n to access RepAZoo data
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=repazoo
      - DB_POSTGRESDB_USER=repazoo_user
      - DB_POSTGRESDB_PASSWORD=repazoo123
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./n8n-files:/files
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

networks:
  default:
    name: repazoo-network