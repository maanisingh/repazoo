version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: repazoo-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=repazoo123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
      - N8N_METRICS=true
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./n8n-files:/files
    networks:
      - repazoo-network

  postgres:
    image: postgres:15
    container_name: repazoo-postgres
    restart: always
    environment:
      - POSTGRES_USER=repazoo
      - POSTGRES_PASSWORD=repazoo123
      - POSTGRES_DB=repazoo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - repazoo-network

volumes:
  postgres-data:
  n8n-data:
  n8n-files:

networks:
  repazoo-network:
    driver: bridge