events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    # Upstream for Next.js app
    upstream nextjs_app {
        server 127.0.0.1:3000;
    }

    # Upstream for Temporal Web UI
    upstream temporal_web {
        server 127.0.0.1:8233;
    }

    # Marketing Site - cfy.repazoo.com (HTTP redirect to HTTPS)
    server {
        listen 80;
        server_name cfy.repazoo.com www.cfy.repazoo.com;
        return 301 https://$server_name$request_uri;
    }

    # Marketing Site - cfy.repazoo.com (HTTPS)
    server {
        listen 443 ssl http2;
        server_name cfy.repazoo.com www.cfy.repazoo.com;

        # SSL configuration
        ssl_certificate /etc/ssl/certs/cfy.repazoo.com.pem;
        ssl_certificate_key /etc/ssl/certs/cfy.repazoo.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Marketing pages routing
        location / {
            # Only allow marketing pages
            if ($request_uri ~ ^/(dashboard|api)) {
                return 404;
            }

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Block dashboard access
        location /dashboard {
            return 404;
        }

        # Block API access except public endpoints
        location /api {
            # Allow only public auth endpoints
            if ($request_uri !~ ^/api/(health|auth/(login|register))) {
                return 404;
            }

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rate limit auth endpoints
        location /api/auth {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Dashboard - dash.repazoo.com (HTTP redirect to HTTPS)
    server {
        listen 80;
        server_name dash.repazoo.com www.dash.repazoo.com;
        return 301 https://$server_name$request_uri;
    }

    # Dashboard - dash.repazoo.com (HTTPS)
    server {
        listen 443 ssl http2;
        server_name dash.repazoo.com www.dash.repazoo.com;

        # SSL configuration
        ssl_certificate /etc/ssl/certs/dash.repazoo.com.pem;
        ssl_certificate_key /etc/ssl/certs/dash.repazoo.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Dashboard and API routing
        location / {
            # Redirect root to dashboard
            if ($request_uri = /) {
                return 301 /dashboard;
            }

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # API endpoints with rate limiting
        location /api {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints with stricter rate limiting
        location /api/auth {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # AI/Temporal Dashboard - ai.repazoo.com (HTTP redirect to HTTPS)
    server {
        listen 80;
        server_name ai.repazoo.com www.ai.repazoo.com;
        return 301 https://$server_name$request_uri;
    }

    # AI/Temporal Dashboard - ai.repazoo.com (HTTPS)
    server {
        listen 443 ssl http2;
        server_name ai.repazoo.com www.ai.repazoo.com;

        # SSL configuration
        ssl_certificate /etc/ssl/certs/ai.repazoo.com.pem;
        ssl_certificate_key /etc/ssl/certs/ai.repazoo.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Temporal Web UI routing
        location / {
            # Admin authentication could be added here
            # For now, allowing access to Temporal UI

            proxy_pass http://temporal_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Handle WebSocket connections for real-time updates
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # API endpoints for Temporal
        location /api {
            proxy_pass http://temporal_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default server (catch-all)
    server {
        listen 80 default_server;
        server_name _;
        return 444; # Close connection without response
    }
}